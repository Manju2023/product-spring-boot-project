<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product List</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#ff9966,#ff5e62);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

table{
    border-collapse: collapse;
    width: 600px;
    text-align: center;
}

th, td{
    padding: 12px;
}

tr:nth-child(even){
    background-color:#f2f2f2;
}

tr:hover{
    background-color:#ddd;
}

th{
    background-color:#ff5e62;
    color:white;
}

button{
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:14px;
}

.edit{
    background-color:#4CAF50;
    color:white;
}

.delete{
    background-color:#f44336;
    color:white;
}

button:hover{
    opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<h2>Product List</h2>

<table border="1">

<tr>
<th>Product</th>
<th>Price</th>
<th>Brand</th>
<th>Feature</th>
</tr>

<tr th:each="product : ${products}">
<td th:text="${product.name}"></td>
<td th:text="${product.price}"></td>
<td th:text="${product.brand}"></td>

<td>

<a th:href="@{edit(id=${product.id})}">
<button class="edit">Edit</button>
</a>

<a th:href="@{delete(id=${product.id})}">
<button class="delete">Delete</button>
</a>

</td>

</tr>

</table>

</div>

</body>
</html>
