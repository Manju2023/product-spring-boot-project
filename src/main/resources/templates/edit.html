<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Update Product</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#11998e,#38ef7d);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    background: white;
    padding: 35px;
    border-radius: 10px;
    width: 320px;
    text-align: center;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}

h2{
    margin-bottom: 20px;
    color:#333;
}

input{
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

input:focus{
    border-color:#11998e;
    outline:none;
}

button{
    width: 100%;
    padding: 10px;
    background:#11998e;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0b7d73;
}

</style>

</head>

<body>

<div class="container">

<h2>Update Product</h2>

<div align="center">
<form action="update" method="post">

<input type="hidden" name="id" th:value="${product.id}">

<input type="text" name="name" placeholder="Name" th:value="${product.name}">

<input type="text" name="price" placeholder="Price" th:value="${product.price}">

<input type="text" name="brand" placeholder="Brand" th:value="${product.brand}">

<button type="submit">Update</button>

</form>
</div>

</div>

</body>
</html>
