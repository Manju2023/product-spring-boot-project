<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Home Page</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    background: white;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
}

h1{
    color: #333;
    margin-bottom: 20px;
}

button{
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 6px;
    background-color: #007bff;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background-color: #0056b3;
    transform: scale(1.05);
}

p{
    margin-top: 20px;
    font-size: 16px;
    font-weight: bold;
    color: green;
}
</style>

</head>

<body>

<div class="container">

<h1>Hello</h1>

<a href="add"><button>Add</button></a>
<a href="manage"><button>View</button></a>

<p th:if="${message}" 
   th:text="${message}">
</p>

</div>

</body>
</html>
