<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Product</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#667eea,#764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
    text-align: center;
    width: 300px;
}

h2{
    margin-bottom: 20px;
    color: #333;
}

input{
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 14px;
}

input:focus{
    border-color: #667eea;
    outline: none;
}

button{
    width: 100%;
    padding: 10px;
    background: #667eea;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background: #4c51bf;
}

</style>

</head>

<body>

<div class="container">

<h2>Add Product</h2>

<form action="insert" method="post">

<input type="text" name="name" placeholder="Enter Name">

<input type="text" name="price" placeholder="Enter Price">

<input type="text" name="brand" placeholder="Enter Brand">

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
